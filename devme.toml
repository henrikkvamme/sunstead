schema_version = 1

[env.DATABASE_URL]
required = true
default = "file:./local.db"
help = "SQLite/libSQL connection string used by Drizzle and the app."

[env.BETTER_AUTH_SECRET]
required = true
generate = "openssl rand -hex 32"
help = "Local Better Auth secret. devme writes this to .env.local on first run."

[env.BETTER_AUTH_URL]
required = true
default = "http://localhost:3000"
help = "Public app URL used by Better Auth in local development."

[step.bun]
check = "command -v bun"
provision = "curl -fsSL https://bun.sh/install | bash"
trust = "manual"

[step.vp]
check = "command -v vp"
provision = "curl -fsSL https://vite.plus | bash && mkdir -p \"$HOME/.local/bin\" && ln -sfn \"$HOME/.vite-plus/bin/vp\" \"$HOME/.local/bin/vp\""
trust = "auto"
depends_on = ["bun"]

[step.deps]
check = "test -d node_modules"
provision = "vp install"
trust = "auto"
depends_on = ["bun", "vp"]

[step.db]
check = "case \"$DATABASE_URL\" in file:*) test -f \"${DATABASE_URL#file:}\" ;; *) true ;; esac"
provision = "bun run db:migrate"
trust = "auto"
depends_on = ["deps"]

[service.web]
cmd = "bun run dev --host 0.0.0.0 --port {port}"
port = { base = 3000, slot_offset = 10 }
url = "http://{host}:{port}"
depends_on = ["db"]
