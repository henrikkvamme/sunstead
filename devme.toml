schema_version = 1

[step.bun]
check = "command -v bun"
provision = "curl -fsSL https://bun.sh/install | bash"
trust = "manual"

[step.vp]
check = "command -v vp"
provision = "curl -fsSL https://vite.plus | bash && mkdir -p \"$HOME/.local/bin\" && ln -sfn \"$HOME/.vite-plus/bin/vp\" \"$HOME/.local/bin/vp\""
trust = "auto"
depends_on = ["bun"]

[step.deps]
check = "test -d node_modules"
provision = "vp install"
trust = "auto"
depends_on = ["bun", "vp"]

[service.web]
cmd = "vp dev --host 0.0.0.0 --port {port}"
port = { base = 3000, slot_offset = 10 }
url = "http://{host}:{port}"
depends_on = ["deps"]
