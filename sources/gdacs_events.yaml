source_id: gdacs_events
name: GDACS Disaster Event Feed
source_type: disaster_alert_feed
adapter: rss
enabled: true
priority: P0
base_url: https://www.gdacs.org/xml/rss.xml
method: GET
auth:
  type: none
headers:
  User-Agent: "${PLATFORM_USER_AGENT}"
pagination:
  type: none
cursor:
  strategy: etag
rate_limit:
  requests_per_minute: 30
  burst: 2
dedupe:
  key_fields:
    - canonical_url
  content_hash: sha256
  canonical_url: true
parser:
  profile: gdacs.events_rss.v1
  chunking: rss_item
compliance:
  robots: validate_before_feed_fetch
  license_notes: GDACS public RSS feed. Event resources indicate European Union CC BY 4.0 reuse with appropriate credit to GDACS/EC-JRC where applicable.
  pii_expected: false
  data_minimization: Store event identifiers, alert level, event type, country/location, severity, population/exposure metrics, dates, coordinates, CAP and report links needed for disaster-risk provenance.
  retention_notes: Public official disaster alert records retained for reproducibility and supply-chain exposure history.
schedule:
  cadence: 15m
  jitter_seconds: 120
fixtures:
  success: tests/fixtures/sources/gdacs_events/success.xml
