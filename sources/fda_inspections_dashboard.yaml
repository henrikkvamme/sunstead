source_id: fda_inspections_dashboard
name: FDA Inspections Data Dashboard
source_type: government_dashboard
adapter: html_scraper
enabled: true
priority: P1
base_url: https://datadashboard.fda.gov/oii/cd/inspections.htm
method: GET
auth:
  type: none
headers:
  User-Agent: "${PLATFORM_USER_AGENT}"
pagination:
  type: none
cursor:
  strategy: content_hash
rate_limit:
  requests_per_minute: 30
  burst: 2
dedupe:
  key_fields:
    - canonical_url
  content_hash: sha256
  canonical_url: true
parser:
  profile: fda.inspections_dashboard.v1
  chunking: tabular_record
compliance:
  robots: validate_before_scraping
  license_notes: FDA public inspections dashboard. Structured dataset downloads are generated by dashboard export actions and may require OII Unified Logon API credentials for automated API use.
  pii_expected: false
  data_minimization: Store inspection IDs, FEI/facility/company fields, classifications, citation details, published 483 references, dates, and source caveats needed for regulatory provenance.
  retention_notes: Public official source records retained for reproducibility and regulatory-event history.
schedule:
  cadence: 1w
  jitter_seconds: 1800
fixtures:
  success: tests/fixtures/sources/fda_inspections_dashboard/success.csv
