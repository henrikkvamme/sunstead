name: Security

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect manifests
        id: manifests
        shell: bash
        run: |
          test -f package.json && echo "node=true" >> "$GITHUB_OUTPUT" || true
          test -f bun.lock && echo "bun=true" >> "$GITHUB_OUTPUT" || true
          test -f package-lock.json && echo "npm=true" >> "$GITHUB_OUTPUT" || true
          test -f pnpm-lock.yaml && echo "pnpm=true" >> "$GITHUB_OUTPUT" || true
          test -f go.mod && echo "go=true" >> "$GITHUB_OUTPUT" || true

      - name: Setup Bun
        if: steps.manifests.outputs.bun == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Bun audit
        if: steps.manifests.outputs.bun == 'true'
        run: |
          bun install --frozen-lockfile
          bun audit

      - name: Setup Node
        if: steps.manifests.outputs.node == 'true' && steps.manifests.outputs.bun != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: npm audit
        if: steps.manifests.outputs.npm == 'true' && steps.manifests.outputs.bun != 'true'
        run: |
          npm ci
          npm audit --audit-level=high --omit=dev

      - name: pnpm audit
        if: steps.manifests.outputs.pnpm == 'true' && steps.manifests.outputs.bun != 'true'
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm audit --prod --audit-level high

      - name: Setup Go
        if: steps.manifests.outputs.go == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: govulncheck
        if: steps.manifests.outputs.go == 'true'
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan high and critical fixed vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: "1"
